name: mobile
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.5+6

environment:
  sdk: ^3.8.1


dependencies:
  flutter:
    sdk: flutter

  device_info_plus: ^11.1.1
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  app_links: ^7.0.0
  intl: ^0.19.0
  flutter_secure_storage: ^10.0.0
  encrypt: ^5.0.3
  shared_preferences: ^2.5.3
  http: ^1.2.2
  bip39: ^1.0.6
  cryptography: ^2.5.0
  crypto: ^3.0.3
  isar: ^3.1.0
  path_provider: ^2.0.0
  isar_flutter_libs: ^3.1.0+1
  firebase_auth: ^6.1.3
  linkify: ^5.0.0
  flutter_linkify: ^6.0.0
  public_suffix: ^3.0.0
  punycode: ^1.0.0
  tflite_flutter: ^0.12.0
  libsignal_protocol_dart: ^0.7.2
  google_fonts: ^8.0.2
  provider: ^6.1.5+1
  flutter_webrtc: ^0.12.1
  permission_handler: ^11.3.1
  # url_launcher already present above (keep existing version)

  cloud_firestore: any
  firebase_core: any
  firebase_storage: any
  firebase_messaging: any
  flutter_local_notifications: ^18.0.0
  
  # Settings & Profile Additions
  image_picker: ^1.1.2
  share_plus: ^10.1.0
  flutter_ringtone_player: ^4.0.0+4
  audioplayers: ^6.6.0
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/mobil_logo_no_bg.png"
  adaptive_icon_background: "#0f172a" # Slate 900 (Dark background to match your app theme)
  adaptive_icon_foreground: "assets/mobil_logo_padded.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
    - assets/security/
    - assets/ml/
    - assets/sounds/


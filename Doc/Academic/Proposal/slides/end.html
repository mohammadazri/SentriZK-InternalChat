<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentriZK - Presentation Concluded</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-icons-font@v13/font/simple-icons.min.css">

    <link rel="stylesheet" href="phone.css">

    <style>
        /* --- GLOBAL LAYOUT --- */
        body {
            justify-content: flex-start;
            padding-top: 3vh;
            background: #020617; /* Deep Navy Theme */
        }
        
        .container {
            max-width: 94vw; 
            height: 94vh;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        .logo-header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 2rem;
        }
        .logo-box { display: flex; align-items: center; gap: 15px; }
        .uni-logo { height: 60px; width: auto; object-fit: contain; } /* Ensure you have a white version of UniKL logo or use filter: brightness(0) invert(1) */
        
        .project-branding {
                      text-align: right;
                      display: flex;
                      align-items: center;
                      gap: 12px;
                      justify-content: flex-end;
                  }
        .pb-title { font-family: 'Space Grotesk'; font-weight: 700; font-size: 1.5rem; color: #fff; letter-spacing: 1px; }
        .pb-sub { font-size: 0.8rem; color: var(--accent-blue); text-transform: uppercase; letter-spacing: 2px; }

        /* --- GRID --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr; /* single centered column */
            gap: 0;
            flex: 1;
            align-items: center;
            justify-items: center;
            padding: 2rem 0;
        }

        /* --- PANELS --- */
        .panel {
            background: rgba(30, 41, 59, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(20px);
            display: flex; flex-direction: column;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.4);
        }

        /* --- LEFT: PROFILE --- */
        .profile-container { text-align: center; }
        .avatar-frame {
            width: 140px; height: 140px; margin: 0 auto 1.5rem;
            border-radius: 50%; padding: 4px;
            border: 1px solid rgba(255,255,255,0.1);
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
        }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #0f172a; }
        .student-name { font-size: 1.8rem; font-weight: 700; color: #fff; line-height: 1.2; margin-bottom: 5px; }
        .student-id { 
            font-family: 'JetBrains Mono'; font-size: 0.9rem; color: var(--accent-blue); 
            background: rgba(59, 130, 246, 0.1); padding: 4px 12px; border-radius: 6px; display: inline-block; margin-bottom: 2rem;
        }
        .detail-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 0; border-top: 1px dashed rgba(255,255,255,0.1); font-size: 0.95rem;
        }
        .dr-label { color: var(--text-muted); }
        .dr-val { color: #fff; font-weight: 600; }

        /* --- CENTER: MAIN --- */
        .center-panel {
            background: transparent; border: none; box-shadow: none; padding: 0;
            justify-content: center; align-items: center; text-align: center;
        }
        .thank-you-text {
            font-family: 'Space Grotesk'; font-size: 5.5rem; font-weight: 800;
            line-height: 1; letter-spacing: -3px;
            background: linear-gradient(180deg, #ffffff 0%, #94a3b8 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }
        .qa-badge {
            background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--accent-green); padding: 10px 24px; border-radius: 50px;
            font-weight: 600; letter-spacing: 1px; margin-bottom: 5rem;
            display: inline-flex; align-items: center; gap: 10px;
        }
        .blink { animation: blink 1.5s infinite; width: 8px; height: 8px; background: currentColor; border-radius: 50%; }
        
        .stack-row { display: flex; gap: 20px; justify-content: center; }
        .tech-pill {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 24px; border-radius: 14px; display: flex; align-items: center; gap: 12px;
            color: #fff; font-weight: 600; font-size: 1rem;
        }

        /* --- RIGHT: ARTIFACTS (REFINED) --- */
        .artifacts-panel {
            justify-content: space-between; /* Spacing top/bottom */
            gap: 1rem;
        }
        
        .section-label {
            font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 1rem;
        }

        /* QR BLOCK STYLING */
        .qr-block {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            flex: 1; /* Take available space */
            justify-content: center;
        }

        .qr-header {
            display: flex; align-items: center; gap: 8px; color: #fff; font-weight: 700; font-family: 'Space Grotesk'; font-size: 1.1rem;
        }

        /* The QR Frame - Clean & High Contrast */
        .qr-frame-clean {
            background: #fff; /* Solid white for maximum contrast */
            padding: 8px;
            border-radius: 16px;
            width: 160px; height: 160px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
            transition: transform 0.3s ease;
        }
        .qr-frame-clean:hover { transform: scale(1.03); }
        .qr-frame-clean img { width: 100%; height: 100%; object-fit: contain; display: block; }

        /* Status Bar at Bottom of Panel */
        .build-status {
            background: rgba(255,255,255,0.05); border-radius: 8px; padding: 12px;
            display: flex; align-items: center; gap: 10px; margin-top: 1rem;
        }
        .status-text { font-size: 0.8rem; color: #fff; font-weight: 600; font-family: 'JetBrains Mono'; }

        /* --- FOOTER --- */
        .footer-bar {
            margin-top: auto; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.08);
            display: flex; justify-content: space-between; font-family: 'JetBrains Mono'; font-size: 0.75rem; color: rgba(255,255,255,0.3);
        }

        /* Anim */
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; transform: translateY(10px); }
        .d-1 { animation-delay: 0.1s; } .d-2 { animation-delay: 0.2s; } .d-3 { animation-delay: 0.3s; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="grid-lines"></div>
    <div class="glow-spot" style="left: 50%; top: 50%; width: 70vw; height: 70vw; transform: translate(-50%,-50%); background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 60%);"></div>

    <div class="container">
        
        <header class="logo-header">
            <div class="logo-box">
                <img src="diagram/dark_unikl.png" alt="UniKL Logo" class="uni-logo" style="height: 60px;">
                <div style="height: 40px; width: 1px; background: rgba(255,255,255,0.2);"></div>
                <div style="font-family:'Space Grotesk'; font-weight:700; color:#fff; font-size:1.2rem;">
                    BCSS FINAL YEAR PROJECT
                </div>
            </div>

            <div class="project-branding">
            <div class="project-branding">
                <div style="font-family:'Space Grotesk'; font-weight:700; color:#fff; font-size:1.2rem;">
                    SentriZK
                </div>
                <div style="height: 40px; width: 1px; background: rgba(255,255,255,0.2);"></div>
                <img src="diagram/logo_no_bg.png" alt="UniKL Logo" class="uni-logo" style="height: 60px;">
                
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="panel center-panel fade-in d-2" style="max-width:920px; width:100%;">
                <div class="thank-you-text">Thank You</div>
                
                <div class="qa-badge">
                    <span class="blink"></span> Q&A SESSION OPEN
                </div>

                <div style="margin-top: 2rem;">
                    <div class="section-label" style="margin-bottom: 1.5rem;">Framework Implementation</div>
                    <div class="stack-row">
                        <div class="tech-pill">
                            <i class="si si-flutter" style="color:#42A5F5"></i> Flutter
                        </div>
                        <div class="tech-pill">
                            <i class="si si-nodedotjs" style="color:#66BB6A"></i> Node.js
                        </div>
                        <div class="tech-pill">
                            <i class="si si-tensorflow" style="color:#FFA726"></i> TFLite
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer-bar">
            <span>© 2026 SentriZK Framework</span>
            <span>UniKL MIIT / BCSS Final Year Project</span>
        </div>

    </div>

</body>
</html>

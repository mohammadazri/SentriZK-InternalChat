<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentriZK - Auth Flow</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Theme Colors */
            --bg-sidebar: #0B1021;  /* Deep Navy */
            --bg-canvas: #ffffff;   /* White */
            
            --text-white: #ffffff;
            --text-blue: #5B8DEF;   /* SentriZK Blue */
            --text-muted: #94a3b8;  /* Slate Grey */
            
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
        }

        /* --- LEFT SIDEBAR --- */
        .sidebar {
            width: 300px;
            background-color: var(--bg-sidebar);
            color: var(--text-white);
            padding: 60px 30px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1e293b;
            box-shadow: 10px 0 30px rgba(0,0,0,0.2);
            z-index: 20;
            flex-shrink: 0;
        }

        /* Header Section */
        .header { margin-bottom: 40px; }

        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1px;
            color: #E2E8F0;
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .project-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text-blue);
            text-transform: uppercase;
            margin-bottom: 25px;
            display: block;
        }

        /* NEW BADGE FOR SPECIFIC FLOW */
        .flow-badge {
            background: rgba(91, 141, 239, 0.15); /* Low opacity blue bg */
            border: 1px solid var(--text-blue);
            color: #93C5FD;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 12px;
            border-radius: 6px;
            display: inline-block;
            box-shadow: 0 4px 12px rgba(91, 141, 239, 0.2);
        }

        /* Legend Section */
        .legend-section {
            flex-grow: 1;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .legend-title {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: block;
        }

        .legend-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 15px;
            font-weight: 400;
            color: #E2E8F0;
            transition: transform 0.2s ease;
        }

        .legend-item:hover {
            transform: translateX(5px);
            color: white;
        }

        /* Icon Boxes (Rounded Squares) */
        .icon-box {
            width: 20px;
            height: 20px;
            border-radius: 5px;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* Special Effects */
        .txt-zkp { color: #E9D5FF; text-shadow: 0 0 12px rgba(168, 85, 247, 0.6); }

        /* Footer */
        .footer {
            margin-top: auto;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }
        
        .footer p {
            font-size: 12px;
            line-height: 1.5;
            color: var(--text-muted);
        }

        /* --- RIGHT CANVAS --- */
        .canvas {
            flex-grow: 1;
            background-color: var(--bg-canvas);
            padding: 60px;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            
            /* Professional Grid Pattern */
            background-image: 
                linear-gradient(#F1F5F9 1px, transparent 1px),
                linear-gradient(90deg, #F1F5F9 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .diagram-img {
            max-width: 100%;
            height: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-shadow: 0 20px 50px -10px rgba(0,0,0,0.1);
            background: white;
        }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="header">
            <h1>Flowchart</h1>
            <span class="project-title">SENTRIZK</span>
            
            <div class="flow-badge">AUTHENTICATION & SESSION FLOW</div>
        </div>

        <div class="legend-section">
            <span class="legend-title">Color Legend</span>
            
            <div class="legend-list">
                <div class="legend-item">
                    <div class="icon-box" style="background: #60A5FA;"></div> 
                    <span>Client / Mobile App</span>
                </div>
                
                <div class="legend-item">
                    <div class="icon-box" style="background: #4ADE80;"></div> 
                    <span>Backend API</span>
                </div>
                
                <div class="legend-item">
                    <div class="icon-box" style="background: #C084FC; box-shadow: 0 0 10px rgba(192, 132, 252, 0.5);"></div>
                    <span class="txt-zkp">ZKP Cryptography</span>
                </div>
                
                <div class="legend-item">
                    <div class="icon-box" style="background: #FACC15;"></div>
                    <span>Logic Decision</span>
                </div>
                
                <div class="legend-item">
                    <div class="icon-box" style="background: #22C55E;"></div>
                    <span>Success State</span>
                </div>

                <div class="legend-item">
                    <div class="icon-box" style="background: #F87171;"></div>
                    <span>Error / Denial</span>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Figure 3.5: Detailed view of the Zero-Knowledge Proof (ZKP) handshake and secure session establishment.</p>
        </div>
    </aside>

    <main class="canvas">
        <img src="flowchart.png" alt="" class="diagram-img">
    </main>

</body>
</html>
